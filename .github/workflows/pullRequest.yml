name: Build Pull Requests

on:
  pull_request:
    branches: [ master ]

jobs:
  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      client: ${{ steps.changes.outputs.client }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Detect file changes
      id: changes
      run: |
        git fetch origin master
        CHANGED_FILES=$(git diff origin/master...HEAD --name-only)
        
        HAS_BACKEND=false
        HAS_CLIENT=false
        
        while IFS= read -r file; do
          [[ $file == src/* ]] && HAS_BACKEND=true
          [[ $file == client/* ]] && HAS_CLIENT=true
        done <<< "$CHANGED_FILES"
        
        echo "backend=$HAS_BACKEND" >> $GITHUB_OUTPUT
        echo "client=$HAS_CLIENT" >> $GITHUB_OUTPUT

  build-backend:
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
       HUSKY: 0
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Test
      run: dotnet test -c Release --no-build --verbosity normal

  build-client:
    permissions:
      contents: read
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    env:
       HUSKY: 0
    steps:
    - uses: actions/checkout@v5
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      working-directory: ./client
      run: npm install
    - name: Build
      working-directory: ./client
      run: npm run build
    - name: Test
      working-directory: ./client
      run: npm test
